<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delta Eclipse Prime v6</title>
    <style>
        :root {
            --p: #00ffa3; --bg: #050a0e; --panel: #0d161d;
            --msg-out: #005c4b; --msg-in: #1b2730; --txt: #e9edef;
            --muted: #8696a0; --glass: rgba(255, 255, 255, 0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); height: 100vh; overflow: hidden; color: var(--txt); }

        /* --- LOADING --- */
        #loading {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .ring { width: 50px; height: 50px; border: 3px solid var(--panel); border-top-color: var(--p); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- LAYOUT --- */
        #app { display: none; height: 100vh; width: 100%; }
        .main-container { display: flex; height: 100%; width: 100%; }

        /* SIDEBAR */
        #sidebar { width: 350px; background: var(--panel); border-right: 1px solid var(--glass); display: flex; flex-direction: column; position: relative; }
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #222; cursor: pointer; border: 2px solid transparent; }
        .avatar:hover { border-color: var(--p); }

        /* SEARCH AREA */
        .search-box { padding: 15px; position: relative; }
        #search-input { width: 100%; padding: 10px 15px; border-radius: 20px; border: 1px solid var(--glass); background: #000; color: #fff; outline: none; }
        #search-results { 
            position: absolute; top: 60px; left: 15px; right: 15px; background: var(--panel); 
            border: 1px solid var(--p); border-radius: 10px; z-index: 1000; display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* CHAT LIST */
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 12px 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid var(--glass); }
        .chat-item:hover { background: var(--glass); }

        /* CHAT WINDOW */
        #chat-window { flex: 1; display: flex; flex-direction: column; background: #0b141a; position: relative; }
        #msg-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px 14px; border-radius: 15px; font-size: 15px; line-height: 1.4; position: relative; }
        .msg-out { align-self: flex-end; background: var(--msg-out); border-bottom-right-radius: 2px; }
        .msg-in { align-self: flex-start; background: var(--msg-in); border-bottom-left-radius: 2px; }

        /* CONTROLS */
        .input-bar { padding: 15px; background: var(--panel); display: flex; gap: 10px; }
        .input-bar input { flex: 1; padding: 12px 20px; border-radius: 25px; border: none; background: #000; color: #fff; outline: none; }
        .btn-send { background: var(--p); color: #000; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-weight: bold; }

        /* PANELS */
        .panel { position: absolute; inset: 0; background: var(--panel); z-index: 500; transform: translateX(-100%); transition: 0.4s ease; padding: 20px; }
        .panel.open { transform: translateX(0); }
        .close-btn { color: var(--p); cursor: pointer; margin-bottom: 20px; display: inline-block; }

        /* AUTH */
        #auth { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: var(--panel); padding: 30px; border-radius: 20px; width: 350px; text-align: center; box-shadow: 0 20px 50px #000; }
        .captcha { background: #000; color: var(--p); padding: 10px; margin: 15px 0; letter-spacing: 5px; font-weight: bold; border-radius: 5px; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; z-index: 100; }
            #sidebar.hide { display: none; }
        }
    </style>
</head>
<body>

    <div id="loading"><div class="ring"></div><p style="margin-top:10px">Sohbet Yükleniyor...</p></div>

    <!-- AUTH -->
    <div id="auth">
        <div class="auth-card">
            <h2 style="color:var(--p)">Delta Eclipse</h2>
            <p style="font-size:12px; color:var(--muted)">v6 Prime Edition</p>
            <input type="text" id="u-in" placeholder="Kullanıcı Adı" style="width:100%; padding:10px; margin-top:20px; background:#000; color:#fff; border:none; border-radius:5px;">
            <input type="password" id="p-in" placeholder="Şifre" style="width:100%; padding:10px; margin-top:10px; background:#000; color:#fff; border:none; border-radius:5px;">
            <div class="captcha" id="cap-box">0000</div>
            <input type="text" id="cap-in" placeholder="Kodu Onayla" style="width:100%; padding:10px; background:#000; color:#fff; border:none; border-radius:5px;">
            <button onclick="login()" style="width:100%; padding:12px; margin-top:20px; background:var(--p); border:none; border-radius:5px; font-weight:bold; cursor:pointer;">GİRİŞ YAP</button>
        </div>
    </div>

    <!-- APP -->
    <div id="app">
        <div class="main-container">
            <div id="sidebar">
                <div class="header">
                    <img id="my-av" class="avatar" onclick="openPanel('my-profile')">
                    <h4 style="color:var(--p)">Sohbetler</h4>
                    <button onclick="logout()" style="background:none; border:none; color:var(--muted); cursor:pointer;">Çıkış</button>
                </div>
                
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Arkadaşlarını bul..." oninput="doSearch()">
                    <div id="search-results"></div>
                </div>

                <div id="chat-list" class="chat-list"></div>

                <!-- KENDİ PROFİLİM -->
                <div id="my-profile" class="panel">
                    <span class="close-btn" onclick="closePanel('my-profile')">⬅ Geri</span>
                    <div style="text-align:center">
                        <img id="my-av-big" class="avatar" style="width:100px; height:100px; margin-bottom:20px" onclick="document.getElementById('file-in').click()">
                        <input type="file" id="file-in" hidden onchange="changeAv(this)">
                        <input type="text" id="my-name-in" placeholder="İsim Değiştir" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid var(--glass);">
                        <input type="text" id="my-bio-in" placeholder="Bio ekle.." style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid var(--glass);">
                        <input type="date" id="my-bday-in" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid var(--glass);">
                        <button onclick="saveMe()" style="width:100%; padding:12px; margin-top:20px; background:var(--p); border:none; border-radius:5px; font-weight:bold;">KAYDET</button>
                    </div>
                </div>
            </div>

            <!-- CHAT -->
            <div id="chat-window">
                <div id="chat-header" style="padding:15px; background:var(--panel); display:none; align-items:center; border-bottom:1px solid var(--glass); gap:15px;">
                    <span onclick="mobileBack()" style="color:var(--p); cursor:pointer; font-size:20px; display:none;" id="m-back">⬅</span>
                    <img id="t-av" class="avatar" onclick="showTargetProfile()">
                    <div onclick="showTargetProfile()" style="cursor:pointer">
                        <div id="t-name" style="font-weight:bold">İsim</div>
                        <div style="font-size:11px; color:var(--p)">Çevrimiçi</div>
                    </div>
                </div>

                <div id="msg-container">
                    <div style="margin:auto; text-align:center; opacity:0.2"><h1>DELTA PRIME</h1><p>Bir sohbet seç veya ara.</p></div>
                </div>

                <div id="input-bar" class="input-bar" style="display:none">
                    <input type="text" id="msg-in" placeholder="Mesaj yaz..." onkeypress="if(event.key=='Enter') send()">
                    <button class="btn-send" onclick="send()">➤</button>
                </div>

                <!-- KARŞI TARAF PROFİLİ -->
                <div id="target-profile" class="panel">
                    <span class="close-btn" onclick="closePanel('target-profile')">⬅ Sohbet</span>
                    <div style="text-align:center; margin-top:50px;">
                        <img id="tp-av" class="avatar" style="width:120px; height:120px;">
                        <h2 id="tp-name" style="margin:20px 0 5px;">İsim</h2>
                        <p id="tp-bio" style="color:var(--muted)">Bio yok...</p>
                        <p id="tp-bday" style="font-size:12px; color:var(--p); margin-top:10px;"></p>
                        <hr style="margin:30px 0; border:0; border-top:1px solid var(--glass);">
                        <button onclick="block()" style="color:red; background:none; border:none; cursor:pointer;">Kullanıcıyı Engelle</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = {
            users: JSON.parse(localStorage.getItem('dp_v6_users')) || [{username:'Delta', password:'1', avatar:'', bio:'Admin', bday:''}],
            msgs: JSON.parse(localStorage.getItem('dp_v6_msgs')) || [],
            session: JSON.parse(localStorage.getItem('dp_v6_session')) || null,
            interacted: JSON.parse(localStorage.getItem('dp_v6_inter')) || [] // Sohbet listesindeki kişiler
        };

        let cap = "";
        let active = null;

        window.onload = () => {
            genCap();
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                if(db.session) loginOk(db.session);
            }, 1500);
        };

        function genCap() {
            cap = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('cap-box').innerText = cap;
        }

        function login() {
            const u = document.getElementById('u-in').value.trim();
            const p = document.getElementById('p-in').value.trim();
            const c = document.getElementById('cap-in').value.trim();

            if(!u || !p || c !== cap) { alert("Bilgiler veya kod hatalı!"); genCap(); return; }

            let user = db.users.find(x => x.username.toLowerCase() === u.toLowerCase());
            if(user) {
                if(user.password !== p) { alert("Şifre yanlış!"); return; }
            } else {
                user = { username: u, password: p, avatar: '', bio: '', bday: '' };
                db.users.push(user);
                save();
            }
            loginOk(user);
        }

        function loginOk(user) {
            db.session = user;
            localStorage.setItem('dp_v6_session', JSON.stringify(user));
            document.getElementById('auth').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            updateUI();
            renderList();
        }

        function logout() { localStorage.removeItem('dp_v6_session'); location.reload(); }

        // --- ARAMA SİSTEMİ (FIXED) ---
        function doSearch() {
            const val = document.getElementById('search-input').value.toLowerCase().trim();
            const res = document.getElementById('search-results');
            if(!val) { res.style.display = 'none'; return; }

            const hits = db.users.filter(u => u.username.toLowerCase().includes(val) && u.username !== db.session.username);
            
            if(hits.length > 0) {
                res.innerHTML = hits.map(u => `
                    <div class="chat-item" onclick="startChat('${u.username}')">
                        <img src="${u.avatar || defAv()}" class="avatar" style="width:30px; height:30px">
                        <span>${u.username}</span>
                    </div>
                `).join('');
                res.style.display = 'block';
            } else {
                res.innerHTML = '<p style="padding:10px; font-size:11px; color:gray">Kullanıcı bulunamadı.</p>';
                res.style.display = 'block';
            }
        }

        function startChat(uname) {
            if(!db.interacted.includes(uname)) {
                db.interacted.push(uname);
                localStorage.setItem('dp_v6_inter', JSON.stringify(db.interacted));
            }
            document.getElementById('search-results').style.display = 'none';
            document.getElementById('search-input').value = '';
            openChat(uname);
            renderList();
        }

        function renderList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            
            db.interacted.forEach(uname => {
                const u = db.users.find(x => x.username === uname);
                if(!u) return;
                const div = document.createElement('div');
                div.className = 'chat-item';
                div.onclick = () => openChat(uname);
                div.innerHTML = `<img src="${u.avatar || defAv()}" class="avatar"><div><b>${uname}</b><br><small style="color:var(--muted)">${u.bio || 'Mesaj gönder...'}</small></div>`;
                list.appendChild(div);
            });
        }

        // --- SOHBET ---
        function openChat(uname) {
            active = uname;
            const u = db.users.find(x => x.username === uname);
            document.getElementById('chat-header').style.display = 'flex';
            document.getElementById('input-bar').style.display = 'flex';
            document.getElementById('t-name').innerText = uname;
            document.getElementById('t-av').src = u.avatar || defAv();
            
            if(window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('hide');
                document.getElementById('m-back').style.display = 'block';
            }
            renderMsgs();
        }

        function renderMsgs() {
            const box = document.getElementById('msg-container');
            box.innerHTML = '';
            const filtered = db.msgs.filter(m => (m.f === db.session.username && m.t === active) || (m.t === db.session.username && m.f === active));
            
            filtered.forEach(m => {
                const div = document.createElement('div');
                div.className = `msg ${m.f === db.session.username ? 'msg-out' : 'msg-in'}`;
                div.innerText = m.txt;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        }

        function send() {
            const i = document.getElementById('msg-in');
            if(!i.value.trim()) return;
            db.msgs.push({ f: db.session.username, t: active, txt: i.value });
            i.value = '';
            save(); renderMsgs();
        }

        // --- PROFİLLER ---
        function openPanel(id) { document.getElementById(id).classList.add('open'); }
        function closePanel(id) { document.getElementById(id).classList.remove('open'); }

        function showTargetProfile() {
            const u = db.users.find(x => x.username === active);
            document.getElementById('tp-av').src = u.avatar || defAv();
            document.getElementById('tp-name').innerText = u.username;
            document.getElementById('tp-bio').innerText = u.bio || "Hakkında bir bilgi eklememiş.";
            document.getElementById('tp-bday').innerText = u.bday ? "🎂 Doğum Günü: " + u.bday : "";
            openPanel('target-profile');
        }

        function updateUI() {
            document.getElementById('my-av').src = db.session.avatar || defAv();
            document.getElementById('my-av-big').src = db.session.avatar || defAv();
            document.getElementById('my-name-in').value = db.session.username;
            document.getElementById('my-bio-in').value = db.session.bio;
            document.getElementById('my-bday-in').value = db.session.bday;
        }

        function saveMe() {
            const old = db.session.username;
            const newN = document.getElementById('my-name-in').value.trim();
            if(newN !== old && db.users.find(x => x.username === newN)) { alert("İsim alınmış!"); return; }

            db.msgs.forEach(m => { if(m.f === old) m.f = newN; if(m.t === old) m.t = newN; });
            db.session.username = newN;
            db.session.bio = document.getElementById('my-bio-in').value;
            db.session.bday = document.getElementById('my-bday-in').value;
            db.users = db.users.map(u => u.username === old ? db.session : u);
            save(); updateUI(); renderList();
            alert("Profil güncellendi!");
        }

        function changeAv(input) {
            if(input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => { db.session.avatar = e.target.result; updateUI(); save(); };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function mobileBack() {
            document.getElementById('sidebar').classList.remove('hide');
            document.getElementById('m-back').style.display = 'none';
        }

        function save() {
            localStorage.setItem('dp_v6_users', JSON.stringify(db.users));
            localStorage.setItem('dp_v6_msgs', JSON.stringify(db.msgs));
        }

        function defAv() { return "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23555' d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E"; }

        window.addEventListener('storage', () => {
            db.users = JSON.parse(localStorage.getItem('dp_v6_users')) || [];
            db.msgs = JSON.parse(localStorage.getItem('dp_v6_msgs')) || [];
            if(active) renderMsgs();
            renderList();
        });
    </script>
</body>
</html>
