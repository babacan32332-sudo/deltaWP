<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delta Eclipse Prime v4 - Ultimate</title>
    <style>
        :root {
            --p: #00ffa3; --pd: #008f5d; --bg: #050a0e; --panel: #0d161d;
            --msg-out: #005c4b; --msg-in: #1b2730; --txt: #e9edef; --muted: #8696a0;
            --accent: #00ffa3; --danger: #ff4d4d;
        }
        .light {
            --p: #00a884; --pd: #005c4b; --bg: #e6e9eb; --panel: #ffffff;
            --msg-out: #dcf8c6; --msg-in: #ffffff; --txt: #111b21; --muted: #667781;
            --accent: #00a884;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); height: 100vh; overflow: hidden; color: var(--txt); display: flex; justify-content: center; align-items: center; }

        /* --- LOADING SCREEN --- */
        #loading-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .loader-ring { width: 80px; height: 80px; border: 5px solid var(--panel); border-top: 5px solid var(--p); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- BACKGROUND --- */
        .bubble-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .bubble { position: absolute; background: var(--p); border-radius: 50%; opacity: 0.1; animation: float 15s infinite linear; }
        @keyframes float { 0% { transform: translateY(0) scale(1); opacity: 0.2; } 100% { transform: translateY(-110vh) scale(2); opacity: 0; } }

        /* --- AUTH --- */
        #auth-view {
            width: 90%; max-width: 400px; background: var(--panel); padding: 40px;
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); z-index: 100;
            text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .captcha-box {
            background: #000; color: var(--p); padding: 10px; font-weight: bold;
            font-size: 24px; letter-spacing: 8px; border-radius: 10px; margin: 15px 0;
            user-select: none; font-family: 'Courier New', monospace;
        }

        /* --- APP MAIN --- */
        #app-view {
            display: none; width: 100%; height: 100vh; background: var(--bg);
            z-index: 10; overflow: hidden; position: relative;
        }
        .container { display: flex; width: 100%; height: 100%; }

        /* SIDEBAR */
        #sidebar {
            width: 350px; background: var(--panel); border-right: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column;
        }
        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; left: 0; z-index: 50; }
            #sidebar.hidden { left: -100%; }
        }

        .header { height: 70px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px 20px; cursor: pointer; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .chat-item:hover { background: rgba(255,255,255,0.05); }

        /* CHAT WINDOW */
        #chat-window { flex: 1; display: flex; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: var(--bg); }
        .msg-box { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { position: relative; max-width: 75%; padding: 10px 15px; border-radius: 15px; font-size: 14.5px; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .msg-out { align-self: flex-end; background: var(--msg-out); color: white; border-bottom-right-radius: 2px; }
        .msg-in { align-self: flex-start; background: var(--msg-in); color: var(--txt); border-bottom-left-radius: 2px; }
        .deleted { font-style: italic; opacity: 0.5; }

        .reactions { display: flex; gap: 4px; margin-top: 4px; font-size: 12px; }
        .reaction { background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 10px; cursor: pointer; }

        /* INPUT */
        .input-area { padding: 15px 25px; background: var(--panel); display: flex; align-items: center; gap: 15px; }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 25px; color: white; outline: none; flex: 1; }

        /* UI ELEMENTS */
        .btn { border: none; cursor: pointer; padding: 10px; border-radius: 10px; font-weight: bold; }
        .btn-p { background: var(--p); color: #000; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #222; }
        .side-panel { position: absolute; inset: 0; background: var(--panel); z-index: 100; transform: translateX(-100%); padding: 30px; }
        .side-panel.open { transform: translateX(0); }

        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <!-- SOHBET YÜKLENİYOR -->
    <div id="loading-screen">
        <div class="loader-ring"></div>
        <h2 style="margin-top:20px; letter-spacing: 2px; color:var(--p)">DELTA ECLIPSE</h2>
        <p style="opacity:0.5; font-size:12px; margin-top:10px;">Sohbet Yükleniyor...</p>
    </div>

    <div class="bubble-bg" id="bubbles"></div>

    <!-- GİRİŞ SİSTEMİ -->
    <div id="auth-view">
        <h1 style="color:var(--p); margin-bottom:10px;">Giriş Yap</h1>
        <p style="color:var(--muted); font-size:13px; margin-bottom:20px;">Delta Eclipse Prime v4'e Hoş Geldin</p>
        
        <input type="text" id="user-in" placeholder="Kullanıcı Adı" style="width:100%; margin-bottom:10px;">
        <input type="password" id="pass-in" placeholder="Şifre" style="width:100%; margin-bottom:10px;">
        
        <div class="captcha-box" id="captcha-display">----</div>
        <input type="text" id="captcha-in" placeholder="Yukarıdaki Kodu Yaz" style="width:100%; margin-bottom:20px; text-align:center;">
        
        <button class="btn btn-p" style="width:100%; padding:15px;" onclick="handleAuth()">Sisteme Gir</button>
    </div>

    <!-- ANA UYGULAMA -->
    <div id="app-view">
        <div class="container">
            <!-- Yan Panel -->
            <div id="sidebar">
                <div class="header">
                    <img id="my-avatar" class="avatar" onclick="togglePanel('profile-panel')" style="cursor:pointer">
                    <div style="display:flex; gap:10px;">
                        <button class="btn btn-p" style="padding:5px 15px;" onclick="toggleTheme()">🌓</button>
                    </div>
                </div>
                
                <div style="padding:15px;">
                    <input type="text" id="search-box" placeholder="Arkadaş Ara (Enter)..." onkeypress="if(event.key=='Enter') searchUser()">
                </div>

                <div class="chat-list" id="chat-items"></div>

                <!-- Profil Ayarları -->
                <div id="profile-panel" class="side-panel">
                    <button onclick="togglePanel('profile-panel')" style="background:none; color:var(--p); border:none; cursor:pointer; font-size:20px;">⬅ Geri</button>
                    <div style="text-align:center; margin-top:30px;">
                        <img id="profile-img-big" class="avatar" style="width:120px; height:120px; margin-bottom:20px;" onclick="document.getElementById('avatar-file').click()">
                        <input type="file" id="avatar-file" hidden onchange="updateProfileImg(this)">
                        
                        <div style="text-align:left; margin-top:20px;">
                            <label style="font-size:12px; color:var(--p)">KULLANICI ADI</label>
                            <input type="text" id="prof-name" style="width:100%; margin-bottom:15px;">
                            
                            <label style="font-size:12px; color:var(--p)">HAKKIMDA (BİO)</label>
                            <input type="text" id="prof-bio" placeholder="Bio ekle.." style="width:100%; margin-bottom:15px;">
                            
                            <label style="font-size:12px; color:var(--p)">DOĞUM GÜNÜ</label>
                            <input type="date" id="prof-bday" style="width:100%; margin-bottom:20px;">
                            
                            <button class="btn btn-p" style="width:100%;" onclick="saveProfile()">Değişiklikleri Kaydet</button>
                            <button class="btn" style="width:100%; margin-top:10px; background:#ff4d4d; color:white;" onclick="logout()">Oturumu Kapat</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Mesajlaşma Penceresi -->
            <div id="chat-window">
                <div id="chat-header" class="header" style="background:var(--panel); border-bottom:1px solid rgba(255,255,255,0.05); display:none;">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <button class="btn" onclick="closeChat()" style="background:none; color:var(--p); font-size:20px; display:none;" id="back-mobile">⬅</button>
                        <img id="target-avatar" class="avatar">
                        <div>
                            <div id="target-name" style="font-weight:bold;">Sohbet</div>
                            <div id="target-status" style="font-size:11px; color:var(--p)">Çevrimiçi</div>
                        </div>
                    </div>
                    <button class="btn" onclick="toggleBlock()" id="block-btn" style="background:none; color:var(--danger)">Engelle</button>
                </div>

                <div class="msg-box" id="msg-box">
                    <div style="margin:auto; text-align:center; opacity:0.3">
                        <h1 style="font-size:60px;">🌑</h1>
                        <p>Karanlığın İçinden Bir Mesaj Seç</p>
                    </div>
                </div>

                <div id="input-area" class="input-area" style="display:none;">
                    <input type="text" id="msg-input" placeholder="Bir mesaj yazın..." onkeypress="if(event.key=='Enter') sendMsg()">
                    <button class="btn btn-p" onclick="sendMsg()">GÖNDER</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MESAJ MODALI -->
    <div id="msg-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:var(--panel); padding:20px; border-radius:20px; width:250px; text-align:center;">
            <p style="margin-bottom:15px; font-size:13px; color:var(--muted)">Mesaj İşlemi</p>
            <div style="display:flex; justify-content:center; gap:10px; margin-bottom:20px; font-size:20px;">
                <span onclick="react('❤️')" style="cursor:pointer">❤️</span>
                <span onclick="react('😂')" style="cursor:pointer">😂</span>
                <span onclick="react('🔥')" style="cursor:pointer">🔥</span>
                <span onclick="react('👍')" style="cursor:pointer">👍</span>
            </div>
            <button class="btn" style="width:100%; margin-bottom:5px; background:rgba(255,255,255,0.1); color:white;" onclick="deleteMsg('me')">Benden Sil</button>
            <button id="del-everyone" class="btn" style="width:100%; margin-bottom:15px; background:var(--danger); color:white;" onclick="deleteMsg('all')">Herkezden Sil</button>
            <button class="btn" style="width:100%;" onclick="closeModal()">İptal</button>
        </div>
    </div>

    <script>
        // VERİ TABANI (LOCAL STORAGE)
        let db = {
            users: JSON.parse(localStorage.getItem('de_v4_users')) || [
                {username: 'Delta', password: '123', avatar: '', bio: 'Sistem Admini', bday: '', blocked: []}
            ],
            messages: JSON.parse(localStorage.getItem('de_v4_msgs')) || [],
            session: JSON.parse(localStorage.getItem('de_v4_session')) || null
        };

        let currentCaptcha = "";
        let activeChat = null;
        let selectedMsgId = null;

        // BAŞLANGIÇ
        window.onload = () => {
            genCaptcha();
            createBubbles();
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
            }, 2000);

            if(db.session) loginSuccess(db.session);
        };

        function genCaptcha() {
            currentCaptcha = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('captcha-display').innerText = currentCaptcha;
        }

        function createBubbles() {
            const cont = document.getElementById('bubbles');
            for(let i=0; i<30; i++){
                let b = document.createElement('div');
                b.className = 'bubble';
                b.style.left = Math.random() * 100 + '%';
                b.style.width = b.style.height = (Math.random() * 60 + 20) + 'px';
                b.style.animationDuration = (Math.random() * 10 + 10) + 's';
                b.style.animationDelay = (Math.random() * 5) + 's';
                cont.appendChild(b);
            }
        }

        // GİRİŞ & KAYIT
        function handleAuth() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            const c = document.getElementById('captcha-in').value.trim();

            if(!u || !p || c !== currentCaptcha) {
                alert("Bilgiler eksik veya Captcha hatalı!");
                genCaptcha();
                return;
            }

            let user = db.users.find(x => x.username === u);
            if(user) {
                if(user.password !== p) { alert("Hatalı şifre!"); genCaptcha(); return; }
            } else {
                user = { username: u, password: p, avatar: '', bio: '', bday: '', blocked: [] };
                db.users.push(user);
                save();
            }
            loginSuccess(user);
        }

        function loginSuccess(user) {
            db.session = user;
            localStorage.setItem('de_v4_session', JSON.stringify(user));
            document.getElementById('auth-view').style.display = 'none';
            document.getElementById('app-view').style.display = 'block';
            
            renderSidebar();
            updateProfileUI();
        }

        function logout() {
            localStorage.removeItem('de_v4_session');
            location.reload();
        }

        // PROFİL SİSTEMİ
        function togglePanel(id) { document.getElementById(id).classList.toggle('open'); }

        function updateProfileUI() {
            document.getElementById('my-avatar').src = db.session.avatar || defAv();
            document.getElementById('profile-img-big').src = db.session.avatar || defAv();
            document.getElementById('prof-name').value = db.session.username;
            document.getElementById('prof-bio').value = db.session.bio;
            document.getElementById('prof-bday').value = db.session.bday;
        }

        function saveProfile() {
            const newName = document.getElementById('prof-name').value.trim();
            const oldName = db.session.username;

            // İsim değiştiyse mesajlardaki isimleri de güncellemek gerekir (Mantık gereği)
            if(newName !== oldName) {
                if(db.users.find(u => u.username === newName)) { alert("Bu isim alınmış!"); return; }
                db.messages.forEach(m => {
                    if(m.from === oldName) m.from = newName;
                    if(m.to === oldName) m.to = newName;
                });
            }

            db.session.username = newName;
            db.session.bio = document.getElementById('prof-bio').value;
            db.session.bday = document.getElementById('prof-bday').value;
            
            db.users = db.users.map(u => u.username === oldName ? db.session : u);
            save();
            alert("Profil güncellendi!");
            renderSidebar();
        }

        function updateProfileImg(input) {
            if(input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    db.session.avatar = e.target.result;
                    updateProfileUI();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // MESAJLAŞMA & SOHBET
        function searchUser() {
            const s = document.getElementById('search-box').value.trim();
            const target = db.users.find(u => u.username === s && u.username !== db.session.username);
            if(target) openChat(target.username);
            else alert("Kullanıcı bulunamadı!");
        }

        function renderSidebar() {
            const list = document.getElementById('chat-items');
            list.innerHTML = '';
            
            // Etkileşimde olunan kişileri bul
            const chats = new Set();
            db.messages.forEach(m => {
                if(m.from === db.session.username) chats.add(m.to);
                if(m.to === db.session.username) chats.add(m.from);
            });

            chats.forEach(uname => {
                const u = db.users.find(x => x.username === uname);
                if(!u) return;
                const div = document.createElement('div');
                div.className = 'chat-item';
                div.onclick = () => openChat(uname);
                div.innerHTML = `
                    <img src="${u.avatar || defAv()}" class="avatar">
                    <div><b>${uname}</b><br><small style="color:var(--muted)">${u.bio || '...'}</small></div>
                `;
                list.appendChild(div);
            });
        }

        function openChat(uname) {
            activeChat = uname;
            const u = db.users.find(x => x.username === uname);
            
            document.getElementById('chat-header').style.display = 'flex';
            document.getElementById('input-area').style.display = 'flex';
            document.getElementById('target-name').innerText = uname;
            document.getElementById('target-avatar').src = u.avatar || defAv();
            document.getElementById('block-btn').innerText = db.session.blocked.includes(uname) ? "Engeli Kaldır" : "Engelle";

            if(window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('hidden');
                document.getElementById('back-mobile').style.display = 'block';
            }

            renderMessages();
        }

        function closeChat() {
            document.getElementById('sidebar').classList.remove('hidden');
        }

        function renderMessages() {
            const box = document.getElementById('msg-box');
            box.innerHTML = '';
            
            const filtered = db.messages.filter(m => 
                ((m.from === db.session.username && m.to === activeChat) || (m.to === db.session.username && m.from === activeChat))
                && !m.deletedBy.includes(db.session.username)
            );

            filtered.forEach(m => {
                const div = document.createElement('div');
                div.className = `msg ${m.from === db.session.username ? 'msg-out' : 'msg-in'}`;
                
                if(m.isDeletedAll) {
                    div.innerHTML = `<span class="deleted">Bu mesaj silindi.</span>`;
                } else {
                    div.innerHTML = `<span>${m.text}</span>`;
                    div.onclick = () => showMsgOptions(m.id, m.from === db.session.username);
                    
                    if(m.reactions && Object.keys(m.reactions).length > 0) {
                        let reactHtml = `<div class="reactions">`;
                        for(let r in m.reactions) reactHtml += `<span class="reaction">${r} ${m.reactions[r]}</span>`;
                        div.innerHTML += reactHtml + `</div>`;
                    }
                }
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        }

        function sendMsg() {
            const inp = document.getElementById('msg-input');
            const target = db.users.find(u => u.username === activeChat);
            if(!inp.value.trim() || !activeChat) return;
            if(target.blocked.includes(db.session.username)) { alert("Bu kişiye mesaj gönderemezsin (Engellendin)!"); return; }

            const msg = {
                id: Date.now() + Math.random(),
                from: db.session.username,
                to: activeChat,
                text: inp.value,
                time: new Date().toLocaleTimeString(),
                deletedBy: [],
                isDeletedAll: false,
                reactions: {}
            };

            db.messages.push(msg);
            inp.value = '';
            save();
            renderMessages();
            renderSidebar();
        }

        // MESAJ SEÇENEKLERİ
        function showMsgOptions(id, isMine) {
            selectedMsgId = id;
            document.getElementById('msg-modal').style.display = 'flex';
            document.getElementById('del-everyone').style.display = isMine ? 'block' : 'none';
        }

        function closeModal() { document.getElementById('msg-modal').style.display = 'none'; }

        function deleteMsg(type) {
            const msg = db.messages.find(m => m.id === selectedMsgId);
            if(type === 'me') {
                msg.deletedBy.push(db.session.username);
            } else {
                msg.isDeletedAll = true;
            }
            save();
            renderMessages();
            closeModal();
        }

        function react(emoji) {
            const msg = db.messages.find(m => m.id === selectedMsgId);
            if(!msg.reactions[emoji]) msg.reactions[emoji] = 0;
            msg.reactions[emoji]++;
            save();
            renderMessages();
            closeModal();
        }

        function toggleBlock() {
            if(db.session.blocked.includes(activeChat)) {
                db.session.blocked = db.session.blocked.filter(n => n !== activeChat);
            } else {
                db.session.blocked.push(activeChat);
            }
            save();
            openChat(activeChat);
        }

        function toggleTheme() {
            document.body.classList.toggle('light');
        }

        function save() {
            localStorage.setItem('de_v4_users', JSON.stringify(db.users));
            localStorage.setItem('de_v4_msgs', JSON.stringify(db.messages));
        }

        function defAv() { return "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23555' d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E"; }

        // GERÇEK ZAMANLI SENKRONİZASYON (Farklı Sekmeler İçin)
        window.addEventListener('storage', () => {
            db.users = JSON.parse(localStorage.getItem('de_v4_users')) || [];
            db.messages = JSON.parse(localStorage.getItem('de_v4_msgs')) || [];
            if(activeChat) renderMessages();
            renderSidebar();
        });
    </script>
</body>
</html>
